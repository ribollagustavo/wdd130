<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Learn about our white water rafting company, our history, and our mission.">
    <meta name="author" content="Gustavo Ribolla">
    <title>About Us | White Water Rafting</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <fieldset>
        <header class="site-header">
            <img src="images/logo.jpg" alt="Rafting Logo" class="logo">

            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="trips.html">Trips</a>
                <a href="contact.html">Contact Us</a>
            </nav>
        </header>
    </fieldset>

    <main>

        <section class="hero-box">
            <h1>White Water Rafting</h1>
            </div>
        </section>

        <section class="history-box">
            <div class="contact-text">
                <h2>Estrada vicinal, km 11</h2>
                <h3>Ibiúna, São Paulo</h3>
                <h4>+1 999 999 9999</h4>
                <h5>info@wwrafting.com</h5>
            </div>

            <div class="contact-layout">

                <div class="map">
                    <iframe
                      src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d3655.5988096878923!2d-47.2962971!3d-23.618717!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94cf7b60db59d465%3A0x8fdd71ae4f296fee!2sRecanto%20Seu%20Luis!5e0!3m2!1spt-BR!2sbr!4v1770857688379!5m2!1spt-BR!2sbr"
                      width="600" height="450" allowfullscreen="" loading="lazy"
                      referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>

                <form class="contact-form">

                    <div class="form-row">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Placeholder">
                    </div>

                    <div class="form-row">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Placeholder">
                    </div>

                    <div class="form-row">
                        <p>Message Purpose</p>

                        <label>
                            <input type="radio" id="radio" name="purpose" checked>
                            General Inquiry
                        </label>

                        <label>
                            <input type="radio" id="radio1" name="purpose">
                            Reservation Question
                        </label>

                        <label>
                            <input type="radio" id="radio2" name="purpose">
                            Website Suggestion
                        </label>
                    </div>

                    <div class="form-row">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" placeholder="Type here"></textarea>
                    </div>

                    <div class="form-row checkbox-row">
                        <label>
                            <input type="checkbox" id="checkbox" name="checkbox" checked>
                            Please Subscribe me to the monthly newsletter
                        </label>
                    </div>

                    <button type="submit">Get in Touch!</button>

                </form>

            </div>
        </section>

        </section>


        <section class=" adventures-gallery">
            <h2>We Are Here to Serve You</h2>
            <figure>
                <img src="images/lucas_ferreira.jpg" alt="Lucas Ferreira|Operations Manager">
                <figcaption>Lucas Ferreira|Operations Manager</figcaption>
            </figure>

            <figure>
                <img src="images/camila_rodrigues.webp"
                  alt="Camila Rodrigues|Marketing Coordinator">
                <figcaption>Camila Rodrigues|Marketing Coordinator</figcaption>
            </figure>

            <figure>
                <img src="images/rafael_moreira.jpg" alt="Rafael Moreira|Senior Rafting Guide">
                <figcaption>Rafael Moreira|Senior Rafting Guide</figcaption>
            </figure>

        </section>

    </main>

    <footer>
        <p>© 2026 White Water Rafting Co. | Gustavo Ribolla</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram">
            </a>
            <a href="https://twitter.com">
                <img src="images/twitter.png" alt="Twitter">
            </a>
        </nav>
    </footer>

</body>

</html>
